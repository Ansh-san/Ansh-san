<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0b0b1f"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#ffe9a8"/>
      <stop offset="70%" stop-color="#ff9d3d"/>
      <stop offset="100%" stop-color="#ff9d3d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="explosionGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#fff2c2"/>
      <stop offset="60%" stop-color="#ff6a3d"/>
      <stop offset="100%" stop-color="#ff6a3d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="diskGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffdd88" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ffb347" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="80%" stop-color="#ffb347" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffdd88" stop-opacity="0"/>
    </linearGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="bigBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="300" fill="url(#bg)"/>

  <!-- twinkling background stars -->
  <g fill="#ffffff">
    <circle cx="80"  cy="40"  r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="0s"   repeatCount="indefinite"/></circle>
    <circle cx="180" cy="220" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="90"  r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="250" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="60"  cy="180" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.3s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="410" cy="50"  r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="240" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.8s" begin="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="130" r="1.0"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="45"  r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.0s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="230" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="90"  r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="1140" cy="200" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="150" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="30"  r="1.0"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="40"  cy="270" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" begin="1.0s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="20"  r="1.0"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="280" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="60"  r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" begin="0.1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- PHASE 1: the star, glowing and pulsing -->
  <g id="phase-star">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.25;0.32;0.97;1" dur="14s" repeatCount="indefinite"/>
    <circle cx="600" cy="150" r="70" fill="url(#starGlow)" filter="url(#softBlur)">
      <animateTransform attributeName="transform" type="scale" additive="sum" values="1;1.08;1;1.08;1" keyTimes="0;0.25;0.5;0.75;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="150" r="26" fill="#fff8e6"/>
  </g>

  <!-- PHASE 2: supernova burst -->
  <g id="phase-explosion">
    <circle cx="600" cy="150" r="0" fill="url(#explosionGlow)" filter="url(#bigBlur)">
      <animate attributeName="r" values="0;0;150;50;0" keyTimes="0;0.25;0.29;0.4;1" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;0.6;0" keyTimes="0;0.25;0.29;0.4;1" dur="14s" repeatCount="indefinite"/>
    </circle>

    <g transform="rotate(0 600 150)">
      <ellipse cx="600" cy="150" rx="16" ry="3" fill="url(#explosionGlow)" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,0;10,0;180,0;180,0" keyTimes="0;0.25;0.28;0.42;1" dur="14s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.3;0.4;0.5;1" dur="14s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g transform="rotate(30 600 150)">
      <ellipse cx="600" cy="150" rx="14" ry="3" fill="url(#explosionGlow)" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,0;10,0;160,0;160,0" keyTimes="0;0.25;0.28;0.42;1" dur="14s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.3;0.4;0.5;1" dur="14s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g transform="rotate(60 600 150)">
      <ellipse cx="600" cy="150" rx="18" ry="3" fill="url(#explosionGlow)" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,0;10,0;190,0;190,0" keyTimes="0;0.25;0.28;0.42;1" dur="14s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.3;0.4;0.5;1" dur="14s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g transform="rotate(90 600 150)">
      <ellipse cx="600" cy="150" rx="15" ry="3" fill="url(#explosionGlow)" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,0;10,0;170,0;170,0" keyTimes="0;0.25;0.28;0.42;1" dur="14s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.3;0.4;0.5;1" dur="14s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g transform="rotate(120 600 150)">
      <ellipse cx="600" cy="150" rx="17" ry="3" fill="url(#explosionGlow)" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,0;10,0;185,0;185,0" keyTimes="0;0.25;0.28;0.42;1" dur="14s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.3;0.4;0.5;1" dur="14s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g transform="rotate(150 600 150)">
      <ellipse cx="600" cy="150" rx="14" ry="3" fill="url(#explosionGlow)" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,0;10,0;155,0;155,0" keyTimes="0;0.25;0.28;0.42;1" dur="14s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.3;0.4;0.5;1" dur="14s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g transform="rotate(180 600 150)">
      <ellipse cx="600" cy="150" rx="16" ry="3" fill="url(#explosionGlow)" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,0;10,0;175,0;175,0" keyTimes="0;0.25;0.28;0.42;1" dur="14s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.3;0.4;0.5;1" dur="14s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g transform="rotate(210 600 150)">
      <ellipse cx="600" cy="150" rx="18" ry="3" fill="url(#explosionGlow)" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,0;10,0;195,0;195,0" keyTimes="0;0.25;0.28;0.42;1" dur="14s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.3;0.4;0.5;1" dur="14s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g transform="rotate(240 600 150)">
      <ellipse cx="600" cy="150" rx="15" ry="3" fill="url(#explosionGlow)" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,0;10,0;165,0;165,0" keyTimes="0;0.25;0.28;0.42;1" dur="14s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.3;0.4;0.5;1" dur="14s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g transform="rotate(270 600 150)">
      <ellipse cx="600" cy="150" rx="17" ry="3" fill="url(#explosionGlow)" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,0;10,0;180,0;180,0" keyTimes="0;0.25;0.28;0.42;1" dur="14s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.3;0.4;0.5;1" dur="14s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g transform="rotate(300 600 150)">
      <ellipse cx="600" cy="150" rx="14" ry="3" fill="url(#explosionGlow)" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,0;10,0;160,0;160,0" keyTimes="0;0.25;0.28;0.42;1" dur="14s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.3;0.4;0.5;1" dur="14s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g transform="rotate(330 600 150)">
      <ellipse cx="600" cy="150" rx="16" ry="3" fill="url(#explosionGlow)" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,0;10,0;170,0;170,0" keyTimes="0;0.25;0.28;0.42;1" dur="14s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.3;0.4;0.5;1" dur="14s" repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>

  <!-- PHASE 3: the black hole and its accretion disk -->
  <g id="phase-blackhole">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.38;0.45;0.95;1" dur="14s" repeatCount="indefinite"/>

    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 600 150" to="360 600 150" dur="7s" repeatCount="indefinite"/>
      <ellipse cx="600" cy="150" rx="190" ry="46" fill="none" stroke="url(#diskGrad)" stroke-width="10" opacity="0.85" filter="url(#softBlur)"/>
      <ellipse cx="600" cy="150" rx="145" ry="32" fill="none" stroke="url(#diskGrad)" stroke-width="6" opacity="0.9"/>
      <ellipse cx="600" cy="150" rx="100" ry="20" fill="none" stroke="url(#diskGrad)" stroke-width="4" opacity="0.95"/>
    </g>

    <circle cx="600" cy="150" r="48" fill="none" stroke="#ffdca3" stroke-width="2" opacity="0.6" filter="url(#softBlur)"/>
    <circle cx="600" cy="150" r="40" fill="#000000"/>
  </g>
</svg>
